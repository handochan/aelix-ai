[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aelix-ai"
version = "0.1.0"
description = "Aelix AI primitives — messages, tools, streaming types. Pi-ai parity."
readme = "../../README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Aelix Contributors" }]
dependencies = [
    # Sprint 6a (Phase 4.1, ADR-0045) — official Anthropic Python SDK
    # for byte-level Pi parity (Pi providers/anthropic.ts uses
    # @anthropic-ai/sdk). Wrapped via ``providers/_anthropic_client.py``
    # for future ``httpx`` swap.
    "anthropic>=0.40,<1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/aelix_ai"]
