[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "aelix-ai"
version = "0.1.0b1"
description = "Aelix AI primitives — messages, tools, streaming types. Pi-ai parity."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE", "THIRD-PARTY-NOTICES.md"]
authors = [{ name = "Aelix Contributors" }]
keywords = ["ai", "llm", "agent", "anthropic", "openai", "streaming", "tools"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    # Sprint 6a (Phase 4.1, ADR-0045) — official Anthropic Python SDK
    # for byte-level Pi parity (Pi providers/anthropic.ts uses
    # @anthropic-ai/sdk). Wrapped via ``providers/_anthropic_client.py``
    # for future ``httpx`` swap.
    "anthropic>=0.40,<1.0",
    # Sprint 6b (Phase 4.2, ADR-0047) — official OpenAI Python SDK for
    # byte-level Pi parity with providers/openai-completions.ts (uses
    # the official ``openai`` npm package). Wrapped via
    # ``providers/_openai_client.py`` for future ``httpx`` swap.
    #
    # #15 (OpenAI **Responses** adapter): bumped the floor to ``>=1.66``
    # so ``openai.resources.responses`` (the Responses streaming event
    # types + ``client.responses.create``) is guaranteed present. The
    # shared engine consumes duck-typed SSE event objects, but the thin
    # adapter that follows needs the SDK surface.
    "openai>=1.66,<2.0",
    # Sprint 6c (Phase 4.3, ADR-0052) — direct httpx use for OAuth
    # token exchange + refresh (Pi anthropic.ts uses ``fetch`` for
    # the token endpoint, not the SDK). httpx is already a transitive
    # dep of openai+anthropic SDKs; pinning here makes it explicit.
    "httpx>=0.27,<1.0",
    # Issue #13 (validate_tool_arguments) — JSON-Schema validation of model
    # tool-args before dispatch. Pi's ``validateToolArguments`` uses TypeBox's
    # ``Value.Check``/``Errors``; the Python parity port uses ``jsonschema``
    # (the ``Tool.parameters`` are plain JSON-Schema dicts). Floor is 4.18 (the
    # ``referencing``-based line) — pre-4.18 used the legacy ``RefResolver``
    # which auto-fetches remote/file ``$ref`` targets during validation (an
    # SSRF / local-file-read vector when a tool ships an attacker-controlled
    # schema). Already present transitively; pinned here as a first-class dep.
    "jsonschema>=4.18,<5",
    # #15 (Gemini adapters: ``google`` + ``google-vertex``) — official
    # ``google-genai`` Python SDK for byte-level Pi parity with
    # providers/google.ts + api/google-generative-ai.ts (Pi pins
    # ``@google/genai`` 1.52.0). The adapters lazy-import this inside
    # ``create_client`` / ``stream`` so a missing optional dep never hard-fails
    # module import; the pin keeps it explicit for installs that want Gemini.
    "google-genai>=1.52,<2",
]

[project.urls]
Homepage = "https://github.com/handochan/aelix-ai"
Repository = "https://github.com/handochan/aelix-ai"
Issues = "https://github.com/handochan/aelix-ai/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aelix_ai"]
