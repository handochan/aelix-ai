[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aelix-ai"
version = "0.1.0"
description = "Aelix AI primitives — messages, tools, streaming types. Pi-ai parity."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Aelix Contributors" }]
keywords = ["ai", "llm", "agent", "anthropic", "openai", "streaming", "tools"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    # Sprint 6a (Phase 4.1, ADR-0045) — official Anthropic Python SDK
    # for byte-level Pi parity (Pi providers/anthropic.ts uses
    # @anthropic-ai/sdk). Wrapped via ``providers/_anthropic_client.py``
    # for future ``httpx`` swap.
    "anthropic>=0.40,<1.0",
    # Sprint 6b (Phase 4.2, ADR-0047) — official OpenAI Python SDK for
    # byte-level Pi parity with providers/openai-completions.ts (uses
    # the official ``openai`` npm package). Wrapped via
    # ``providers/_openai_client.py`` for future ``httpx`` swap.
    "openai>=1.50,<2.0",
    # Sprint 6c (Phase 4.3, ADR-0052) — direct httpx use for OAuth
    # token exchange + refresh (Pi anthropic.ts uses ``fetch`` for
    # the token endpoint, not the SDK). httpx is already a transitive
    # dep of openai+anthropic SDKs; pinning here makes it explicit.
    "httpx>=0.27,<1.0",
]

[project.urls]
Homepage = "https://github.com/handochan/aelix-ai"
Repository = "https://github.com/handochan/aelix-ai"
Issues = "https://github.com/handochan/aelix-ai/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aelix_ai"]
