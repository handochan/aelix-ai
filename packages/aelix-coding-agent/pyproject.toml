[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aelix-coding-agent"
version = "0.1.0"
description = "Aelix coding agent — ExtensionAPI + built-ins + example tools + TUI. Pi-coding-agent parity."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Aelix Contributors" }]
keywords = ["ai", "agent", "llm", "coding-agent", "cli", "tui", "extensions", "tools"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Code Generators",
  "Topic :: Software Development :: Libraries :: Application Frameworks",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  # Pinned to the shared release version; the workspace sources below are
  # dev-only and stripped from the built metadata.
  "aelix-ai==0.1.0",
  "aelix-agent-core==0.1.0",
  "pygments>=2.18",
  "markdown-it-py>=3.0",
  "mcp>=1.27,<2",
  "Pillow>=11.0,<12.0",
  # WP-0 (ADR-0158) — tree-sitter-bash AUTO-mode safety classifier. Prebuilt
  # cross-platform wheels (linux/macos/windows), no compiler, ~3.4 MiB. Pinned
  # to one grammar-ABI line so node-type names don't silently drift. The
  # classifier fails safe to ASK if the grammar is unavailable (exotic no-wheel
  # platform → sdist build skipped), so the other four postures are unaffected.
  "tree-sitter>=0.25,<0.26",
  "tree-sitter-bash>=0.25,<0.26",
  # #67 (ADR-0189) — Ed25519 detached-signature provenance for extension packs.
  # Promoted from an incidental transitive dep (via google-auth) to a DIRECT dep:
  # the extension signing/verification path imports it, so a clean install must
  # carry it. In-env at 48.0.0; floor at 42 for the stable Ed25519 API surface.
  "cryptography>=42,<49",
]

# Sprint 6h₁₀a (ADR-0088 Q1, ADR-0104): the interactive TUI shell is an
# optional extra. `pip install 'aelix-coding-agent[tui]'` pulls in
# prompt-toolkit (input/editor) + rich (output rendering). The entry point
# degrades gracefully with an actionable message when the extra is absent.
[project.optional-dependencies]
tui = [
  "prompt-toolkit>=3.0,<4",
  "rich>=13.7,<15",
]

# Sprint 6h₁₀c (ADR-0106): inline image rendering is a further optional
# extra on top of `[tui]`. `pip install 'aelix-coding-agent[images]'` pulls
# in rich-pixels (the Rich-renderable Unicode half-block tier). The native
# graphics tier (Kitty / iTerm2 escape protocols) is driven by term-image,
# which is NOT pinned here: its current release hard-caps Pillow<11 and
# conflicts with this package's Pillow>=11 core pin. Install it manually
# (with a compatible Pillow) to enable graphics output:
#   pip install 'term-image<1'
# images.py guards the term-image import — when it is absent, capability
# detection still works and rendering degrades to the Unicode tier or a
# text placeholder.
images = [
  "rich-pixels>=3.0,<4",
]

[project.urls]
Homepage = "https://github.com/handochan/aelix-ai"
Repository = "https://github.com/handochan/aelix-ai"
Issues = "https://github.com/handochan/aelix-ai/issues"

# The real `aelix` CLI. The umbrella meta-package re-declares the same
# script (same target) so `uv tool install aelix` works — see the root
# pyproject.toml. Keep the two declarations pointing at the same function.
[project.scripts]
aelix = "aelix_coding_agent.cli.entry:main_sync"

[tool.uv.sources]
aelix-ai = { workspace = true }
aelix-agent-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/aelix_coding_agent"]
